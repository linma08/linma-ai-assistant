<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lin Ma DDS Assistant</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #eef1f5;
      margin: 0;
      padding: 0;
    }

    .container {
      width: 560px;
      margin: 30px auto;
      background: white;
      border-radius: 14px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-top: 0;
      margin-bottom: 14px;
      font-size: 22px;
    }

    .top-buttons {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .quick-btn {
      padding: 10px 14px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      color: white;
      font-size: 14px;
    }

    .call-btn { background: #16a34a; }
    .emergency-btn { background: #dc2626; }
    .book-btn { background: #2563eb; }

    #messages {
      border: 1px solid #d8d8d8;
      border-radius: 10px;
      height: 380px;
      overflow-y: auto;
      padding: 14px;
      background: #fafafa;
      margin-bottom: 14px;
    }

    .msg {
      margin: 10px 0;
      line-height: 1.4;
      max-width: 85%;
      padding: 10px 12px;
      border-radius: 14px;
      white-space: pre-wrap;
    }

    .user {
      background: #dbe9ff;
      margin-left: auto;
    }

    .assistant {
      background: #e4f1e7;
      margin-right: auto;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    #input {
      flex: 1;
      padding: 12px;
      border: 1px solid #cfcfcf;
      border-radius: 8px;
      font-size: 15px;
    }

    button {
      padding: 12px 16px;
      border: none;
      border-radius: 8px;
      background: #2f6fed;
      color: white;
      cursor: pointer;
      font-size: 15px;
    }

    button:hover {
      opacity: 0.95;
    }

    .secondary {
      background: #6b7280;
    }

    .actions {
      text-align: center;
      margin-bottom: 18px;
    }

    .lead-box {
      border: 1px solid #d8d8d8;
      border-radius: 10px;
      padding: 14px;
      background: #f9fbff;
      margin-top: 6px;
    }

    .lead-title {
      font-weight: bold;
      margin-bottom: 10px;
      font-size: 16px;
    }

    .form-row {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 10px;
    }

    .form-row input,
    .form-row textarea {
      padding: 10px;
      border: 1px solid #cfcfcf;
      border-radius: 8px;
      font-size: 14px;
      font-family: Arial, sans-serif;
    }

    textarea {
      resize: vertical;
      min-height: 70px;
    }

    .helper {
      margin-top: 14px;
      font-size: 13px;
      color: #555;
      text-align: center;
    }

    .success {
      color: #166534;
      font-size: 14px;
      margin-top: 8px;
    }

    .error {
      color: #b91c1c;
      font-size: 14px;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Lin Ma DDS Assistant</h1>

    <div class="top-buttons">
      <button class="quick-btn call-btn" onclick="callOffice()">Call Now</button>
      <button class="quick-btn emergency-btn" onclick="emergencyHelp()">Emergency</button>
      <button class="quick-btn book-btn" onclick="showBookingPrompt()">Book Appointment</button>
    </div>

    <div id="messages"></div>

    <div class="input-row">
      <input id="input" type="text" placeholder="Ask a question..." />
      <button onclick="sendMessage()">Send</button>
    </div>

    <div class="actions">
      <button class="secondary" onclick="clearChat()">Clear Chat</button>
    </div>

    <div class="lead-box">
      <div class="lead-title">Request a Call Back</div>

      <div class="form-row">
        <input id="leadName" type="text" placeholder="Your name" />
      </div>

      <div class="form-row">
        <input id="leadPhone" type="text" placeholder="Your phone number" />
      </div>

      <div class="form-row">
        <textarea id="leadReason" placeholder="Reason for visit or question (optional)"></textarea>
      </div>

      <button onclick="submitLeadForm()">Submit</button>
      <div id="leadStatus"></div>
    </div>

    <div class="helper">
      For urgent dental pain, swelling, or trauma, please call (626) 966-4514.
    </div>
  </div>

  <script>
    let history = [];

    window.onload = function() {
      const greeting = "Hello! Welcome to Lin Ma DDS. How can I help you today?";
      addMessage("assistant", "Assistant: " + greeting);
      history.push({ role: "assistant", content: greeting });
    };

    function addMessage(role, text) {
      const messages = document.getElementById("messages");
      const div = document.createElement("div");
      div.className = "msg " + role;
      div.textContent = text;
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
    }

    async function sendMessage() {
      const input = document.getElementById("input");
      const text = input.value.trim();
      if (!text) return;

      addMessage("user", "You: " + text);
      history.push({ role: "user", content: text });
      input.value = "";

      try {
        const res = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            message: text,
            history: history
          })
        });

        const data = await res.json();
        addMessage("assistant", "Assistant: " + data.reply);
        history.push({ role: "assistant", content: data.reply });
      } catch (err) {
        addMessage("assistant", "Assistant: Sorry, something went wrong. Please call (626) 966-4514.");
      }
    }

    function clearChat() {
      document.getElementById("messages").innerHTML = "";
      history = [];
      const greeting = "Hello! Welcome to Lin Ma DDS. How can I help you today?";
      addMessage("assistant", "Assistant: " + greeting);
      history.push({ role: "assistant", content: greeting });
    }

    function callOffice() {
      window.location.href = "tel:6269664514";
    }

    function emergencyHelp() {
      const msg = "I'm sorry you're dealing with that. For dental pain, swelling, bleeding, trauma, or infection, please call our office right away at (626) 966-4514. Same-day emergency appointments may be available depending on the schedule.";
      addMessage("assistant", "Assistant: " + msg);
      history.push({ role: "assistant", content: msg });
    }

    function showBookingPrompt() {
      const msg = "We’d be happy to help with scheduling. You can call (626) 966-4514 or fill out the request form below and our office can follow up with you.";
      addMessage("assistant", "Assistant: " + msg);
      history.push({ role: "assistant", content: msg });
      document.getElementById("leadName").focus();
    }

    async function submitLeadForm() {
      const name = document.getElementById("leadName").value.trim();
      const phone = document.getElementById("leadPhone").value.trim();
      const reason = document.getElementById("leadReason").value.trim();
      const status = document.getElementById("leadStatus");

      status.className = "";
      status.textContent = "";

      if (!name || !phone) {
        status.className = "error";
        status.textContent = "Please enter your name and phone number.";
        return;
      }

      try {
        const res = await fetch("/lead", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            name: name,
            phone: phone,
            reason: reason
          })
        });

        const data = await res.json();

        if (data.success) {
          status.className = "success";
          status.textContent = "Thank you. Your request was saved and the office can follow up with you.";

          document.getElementById("leadName").value = "";
          document.getElementById("leadPhone").value = "";
          document.getElementById("leadReason").value = "";

          const msg = "Thank you. We’ve saved your request and our office can follow up with you.";
          addMessage("assistant", "Assistant: " + msg);
          history.push({ role: "assistant", content: msg });
        } else {
          status.className = "error";
          status.textContent = data.error || "Unable to save your request.";
        }
      } catch (err) {
        status.className = "error";
        status.textContent = "Something went wrong. Please call (626) 966-4514.";
      }
    }

    document.getElementById("input").addEventListener("keydown", function(event) {
      if (event.key === "Enter") {
        sendMessage();
      }
    });
  </script>
</body>
</html>
